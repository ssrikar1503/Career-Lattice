name: Seed taxonomy data

# Manually-triggered one-off workflow that uploads the canonical taxonomies
# (AM + Semi) from JSON into Supabase. Run this ONCE after creating your
# Supabase project — before triggering the ingestion pipeline.
#
# Safe to re-run. Each run replaces canonical_roles for both industries.

on:
  workflow_dispatch:

jobs:
  seed:
    name: Seed industries + canonical roles
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/pipeline/requirements.txt

      - name: Run seeder
        working-directory: apps/pipeline
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python seed_taxonomy.py
