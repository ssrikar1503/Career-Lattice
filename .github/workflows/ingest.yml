name: Weekly ingestion pipeline

on:
  schedule:
    # Every Monday at 10:00 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI
    inputs:
      industries:
        description: 'Industries to process (space-separated, leave blank for all)'
        required: false
        default: ''
      skip_scrape:
        description: 'Skip scraping step'
        type: boolean
        default: false
      skip_extract:
        description: 'Skip extraction step'
        type: boolean
        default: false
      skip_match:
        description: 'Skip matching step'
        type: boolean
        default: false

jobs:
  ingest:
    name: Run pipeline
    runs-on: ubuntu-latest
    # 5 hours — well within GitHub Actions' 6h cap. Sized so the full backlog
    # can clear in one run when Groq is the primary provider (~3-4 hr typical).
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r apps/pipeline/requirements.txt

      - name: Build CLI arguments
        id: args
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.industries }}" ]; then
            ARGS="$ARGS --industries ${{ github.event.inputs.industries }}"
          fi
          if [ "${{ github.event.inputs.skip_scrape }}" = "true" ]; then
            ARGS="$ARGS --skip-scrape"
          fi
          if [ "${{ github.event.inputs.skip_extract }}" = "true" ]; then
            ARGS="$ARGS --skip-extract"
          fi
          if [ "${{ github.event.inputs.skip_match }}" = "true" ]; then
            ARGS="$ARGS --skip-match"
          fi
          echo "cli_args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run ingestion pipeline
        working-directory: apps/pipeline
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
        run: python main.py ${{ steps.args.outputs.cli_args }}

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-log-${{ github.run_id }}
          path: apps/pipeline/*.log
          if-no-files-found: ignore
          retention-days: 14
